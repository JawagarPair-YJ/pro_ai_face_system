
<!DOCTYPE html>
<html>
<head>
<title>AI Face Attendance</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<h1>AI Face Recognition Attendance System</h1>

<div class="menu">
<a href="/student_register"><button>Student Register</button></a>
<a href="/staff_register"><button>Staff Register</button></a>
<a href="/student_attendance"><button>Student Attendance</button></a>
<a href="/staff_attendance"><button>Staff Attendance</button></a>
<a href="/download"><button>Download Report</button></a>
</div>

<table>
<tr>
<th>ID</th>
<th>Person ID</th>
<th>Name</th>
<th>Role</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for row in attendance %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}
</table>
</div>
</body>
</html>
